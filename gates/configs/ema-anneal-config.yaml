# ema-anneal smoke (spec: notes/training-stack.md:180-197). Banner
# 'ema: horizon 3 epochs (... anneal: hold 5 + 10 cosine ...)'; the average
# appears at the live point (epoch 6+).
#
data:
  train_dv:     w0wa_takahashi_dvs_train_cs_16.npy
  train_params: w0wa_takahashi_params_train_cs_16.1.txt
  train_covmat: w0wa_takahashi_params_train_cs_16.covmat
  val_dv:       w0wa_takahashi_dvs_train_cs_8.npy
  val_params:   w0wa_takahashi_params_train_cs_8.1.txt
  cosmolike_data_dir: lsst_y1
  cosmolike_dataset:  lsst_y1_M1_GGL0.05.dataset
  param_cuts:
    omegabh2_hi:   0.035
    omegabh2_lo:   0.014
    omegam2h2_lo:  0.015
    omegam2h2_hi:  0.08
  n_train:       25000
  n_val:         5000
  split_seed:    0
  ram_frac:      0.7

train_args:
  nepochs: 20
  bs:      64
  loss:
    mode: sqrt
  ema:
    horizon_epochs: 3
    anneal:
      hold_epochs:   5
      anneal_epochs: 10
      shape:         cosine
  lr:
    lr_base:       0.0025
    bs_base:       64.0
    warmup_epochs: 5
  # baseline train_args blocks build_run_specs requires (template defaults;
  # lr + ema are above):
  optimizer:
    weight_decay: 0.0
  scheduler:
    mode:     min
    patience: 25
    factor:   0.8
  trim:
    start:         0.1
    end:           0.025
    hold_epochs:   50
    anneal_epochs: 300
    shape:         cosine
  focus:
    start:         0.0
    end:           2.0
    hold_epochs:   50
    anneal_epochs: 300
    shape:         linear
    kappa:         0.15
  model:
    name: resmlp
    mlp:
      width:    128
      n_blocks: 4
