# npce-training, exclusivity leg (spec code GPC-C; npce-yaml-wiring.md:117-122).
# DELIBERATELY INVALID: pce beside model.ia. Both replace the chi2 loss, so the
# build must error loudly; the test expects a nonzero exit + the exclusivity message.
#
data:
  train_dv:     w0wa_takahashi_dvs_train_cs_16.npy
  train_params: w0wa_takahashi_params_train_cs_16.1.txt
  train_covmat: w0wa_takahashi_params_train_cs_16.covmat
  val_dv:       w0wa_takahashi_dvs_train_cs_8.npy
  val_params:   w0wa_takahashi_params_train_cs_8.1.txt
  cosmolike_data_dir: lsst_y1
  cosmolike_dataset:  lsst_y1_M1_GGL0.05.dataset
  param_cuts:
    omegabh2_hi:   0.035
    omegabh2_lo:   0.014
    omegam2h2_lo:  0.015
    omegam2h2_hi:  0.08
  n_train:       25000
  n_val:         5000
  split_seed:    0
  ram_frac:      0.7

train_args:
  nepochs: 40
  bs:      256
  loss:
    mode: sqrt
  model:
    name: resmlp
    ia:   nla
    mlp:
      width:    128
      n_blocks: 4

pce:
  form: residual
