# ema-smoke (spec code GM-D; weight-ema-snapshot-coupled.md:240-251). Short bs=64 run,
# ema horizon 3; the banner names the horizon and a rewind fires.
#
data:
  train_dv:     w0wa_takahashi_dvs_train_cs_16.npy
  train_params: w0wa_takahashi_params_train_cs_16.1.txt
  train_covmat: w0wa_takahashi_params_train_cs_16.covmat
  val_dv:       w0wa_takahashi_dvs_train_cs_8.npy
  val_params:   w0wa_takahashi_params_train_cs_8.1.txt
  cosmolike_data_dir: lsst_y1
  cosmolike_dataset:  lsst_y1_M1_GGL0.05.dataset
  param_cuts:
    omegabh2_hi:   0.035
    omegabh2_lo:   0.014
    omegam2h2_lo:  0.015
    omegam2h2_hi:  0.08
  n_train:       25000
  n_val:         5000
  split_seed:    0
  ram_frac:      0.7

train_args:
  nepochs: 60
  bs:      64
  loss:
    mode: sqrt
  ema:
    horizon_epochs: 3
  lr:
    lr_base:       0.0025
    bs_base:       64.0
    warmup_epochs: 5
  model:
    name: resmlp
    mlp:
      width:    128
      n_blocks: 4
