train_args:
  nepochs: 40
  bs:      256
  loss:
    mode: sqrt
  trunk_epochs: 20
  head:
    lr:
      lr_base: 0.001
  model:
    name: resmlp
    mlp:
      width:    128
      n_blocks: 4
