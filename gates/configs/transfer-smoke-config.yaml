# transfer-smoke: a names-equal gain-form transfer over the board's
# own plain base (the tiny emulator save-rebuild-drift persists at
# <driver_root>/chains/gates_emul_evaluate). No extra parameters, so the
# frozen base is evaluated on the full run encoding; epoch 0 must be the base,
# bit for bit, and a two-epoch run must complete. See
# notes/artifacts-inference-warmstart.md.

data:
  train_dv:     w0wa_takahashi_dvs_train_cs_16.npy
  train_params: w0wa_takahashi_params_train_cs_16.1.txt
  train_covmat: w0wa_takahashi_params_train_cs_16.covmat
  val_dv:       w0wa_takahashi_dvs_train_cs_8.npy
  val_params:   w0wa_takahashi_params_train_cs_8.1.txt

  # must equal the base's dataset (the output geometry is pinned).
  cosmolike_data_dir: lsst_y1
  cosmolike_dataset:  lsst_y1_M1_GGL0.05.dataset

  param_cuts:
    omegabh2_hi: 0.035
  n_train:    200
  n_val:      100
  split_seed: 0

# top-level transfer block (a sibling of data / train_args): the frozen base,
# the combination form, and the space (omitted = gain's recommended physical).
transfer:
  from: projects/lsst_y1/chains/gates_emul_evaluate
  form: gain
  # space: physical    # omitted -> gain's recommended default (materialized)

train_args:
  nepochs: 2
  bs:      32

  # the correction net has its own model: block (capacity is the knob here);
  # its family is inherited from the base (a plain base -> a plain correction).
  model:
    name: resmlp
    mlp:
      width:    32
      n_blocks: 1

  loss:
    mode: sqrt
  silent: false          # print the per-epoch lines + the parity verdict

  optimizer:
    weight_decay: 0.0
  lr:
    lr_base:       0.001
    bs_base:       64.0
    warmup_epochs: 1
  scheduler:
    mode:     min
    patience: 10
    factor:   0.8
  trim:
    start:         0.0
    end:           0.0
    hold_epochs:   0
    anneal_epochs: 1
    shape:         cosine
  focus:
    start:         0.0
    end:           0.0
    hold_epochs:   0
    anneal_epochs: 1
    shape:         linear
    kappa:         0.15
