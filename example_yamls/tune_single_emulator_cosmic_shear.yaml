# Config for tune_single_emulator_cosmic_shear.py
#
# Same schema as the training YAML, except a NUMERIC train_args leaf may
# be a SEARCH RANGE instead of a fixed scalar:
#
#     knob: value                       # fixed
#     knob: [default, min, max, kind]   # searched; kind = int|float|log
#
# The first value is the DEFAULT (the training driver uses it; this
# search warm-starts trial 0 from it). Lower nepochs here so each
# trial is fast. String-valued keys (model.name / model.ia /
# model.activation / loss_mode / shapes) are FIXED across the study --
# run one study per choice to compare them. The training YAML's
# trunk_epochs / head two-phase keys work here too (fixed scalars).
#
# Multi-GPU: with more than one visible CUDA device (cap with
# --n-gpus) the trials run in parallel, one worker per GPU, all
# cooperating on ONE study through a journal file (--journal, default
# tune_journal.log under --fileroot). --n-trials is the TOTAL across
# workers. The journal persists: rerunning with the same name RESUMES
# the study; delete it (or pass a new name) to start fresh. See the
# README section "Multi-GPU execution and packing".
#
# The data files below are bare filenames; the driver resolves them under
# $ROOTDIR/<--root>/chains. cosmolike_data_dir / cosmolike_dataset are
# separate, under $ROOTDIR/external_modules/data.

data:
  train_dv:     w0wa_takahashi_dvs_train_cs_16.npy
  train_params: w0wa_takahashi_params_train_cs_16.1.txt
  train_covmat: w0wa_takahashi_params_train_cs_16.covmat
  val_dv:       w0wa_takahashi_dvs_train_cs_8.npy
  val_params:   w0wa_takahashi_params_train_cs_8.1.txt

  cosmolike_data_dir: lsst_y1
  cosmolike_dataset:  lsst_y1_M1_GGL0.05.dataset

  omegabh2_cut:  0.035
  omegabh2_lo:   0.014
  omegam2h2_lo:  0.015
  omegam2h2_hi:  0.08
  train_divisor: 10
  val_divisor:   50
  split_seed:    0
  ram_frac:      0.7

train_args:
  nepochs:   900         # lower than training -> faster trials
  bs:        256
  loss_mode: sqrt
  # clip:   1.0          # per-step gradient-norm ceiling (0 / absent
  #                      # = off); rewind = reload best weights +
  # rewind: true         # optimizer on every plateau lr cut. See the
  #                      # training YAML for the full explanation.

  model:                 # name + ia pick the class; nested sub-blocks
    # name = the ARCHITECTURE (resmlp | rescnn | restrf); ia = the factored
    # intrinsic-alignment design layered on it (omit for the plain
    # emulator; nla | tatt). Both fixed across the study -- see the training
    # YAML's model block for the full nested schema. Any numeric leaf
    # inside a sub-block may be a [default, min, max, kind] range.
    name: resmlp
    # ia:  nla
    mlp:
      width:    [128, 64, 256, int]    # searched
      n_blocks: [4, 2, 6, int]         # searched
    # activation: H          # type, fixed across the study (the
    #                        # --activation flag overrides); nest
    #                        # type: / n_gates: sub-keys for the
    #                        # multi-gate families
    # cnn:                   # name: rescnn only
    #   kernel_size: [11, 5, 21, int]
    #   rescale_kernel: true # kernel_size = one block's view; deeper
    #                        # stacks shrink the per-block kernel
    #   groups:      1       # fixed choice per study (1 | 2 plain;
    #                        # 1 | 3 | 6 with ia: nla) -- not a range
    #   separable:   false   # depthwise + pointwise factorization
    #   film:        false   # cosmology-aware per-channel affine
    #   n_blocks:    [1, 1, 3, int]
    #   gate_init:   0.1
    # trf:                   # name: restrf only (tokens at the natural
    #                        # bin width -- no width knob)
    #   n_heads:      2      # must divide the padded bin length
    #                        # max_bin (LSST-Y1 keeps max_bin = 26
    #                        # theta points -> n_heads 1 | 2 | 13)
    #   n_blocks:     [1, 1, 3, int]
    #   n_mlp_blocks: [2, 1, 4, int]
    #   shared_mlp:   false    # true = textbook shared-MLP ablation
    #   film:         false    # cosmology-aware per-token affine
    #   gate_init:    0.1
    # compile_mode: default  # conv/TRF models already default to this
    #                        # (reduce-overhead is worth one retry)

  optimizer:
    weight_decay: 0.0

  lr:                    # learning rate = lr_base * sqrt(bs / bs_base)
    lr_base:       [0.0025, 1.0e-4, 1.0e-2, log]   # searched, log
    bs_base:       64.0
    warmup_epochs: 10

  scheduler:
    mode:     min
    patience: [25, 10, 40, int]        # searched
    factor:   [0.8, 0.5, 0.95, float]  # searched

  trim:
    start:         [0.1, 0.0, 0.2, float]   # searched
    end:           0.025
    hold_epochs:   50
    anneal_epochs: 300
    shape:         cosine

  focus:
    start:         0.0
    end:           [2.0, 0.0, 4.0, float]   # searched
    hold_epochs:   50
    anneal_epochs: 300
    shape:         linear
    kappa:         [0.15, 0.05, 0.5, log]   # searched
