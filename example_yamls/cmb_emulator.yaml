# CMB spectrum emulator config for cmb_train_emulator.py
# (see notes/families-scalar-cmb.md and emulator/geometries/cmb.py).
#
# A CMB emulator maps cosmological parameters to ONE spectrum's C_ell rows
# (tt / te / ee / pp), on the multipole grid the dumps were generated with.
# The dumps come from compute_data_vectors/dataset_generator_cmb.py (four
# per-spectrum 2D .npy files per run; point train_dv / val_dv at the ONE
# this emulator learns), and the loss covariance comes from
# compute_data_vectors/compute_cmb_covariance.py (the Motloch & Hu Gaussian
# covariance, WITH the experiment's noise and beam). There is no cosmolike
# anywhere on this path.

data:
  # the CMB sub-block: its presence switches the run to the CMB path (the
  # scalar / cosmolike keys are forbidden beside it).
  cmb:
    # which spectrum this emulator learns (tt / te / ee / pp) — the dv
    # files below must be that spectrum's dump.
    spectrum: tt

    # the covariance .npz (compute_cmb_covariance.py). The
    # whitening sigma_ell, the fiducial C_ell, and the provenance all come
    # from this file; the dump and the file must share one ell grid.
    covariance: cmbcov_lcdm.npz

    # the imposed amplitude law. "as_exp2tau" imposes
    # target = C_ell * exp(2 tau) / A_s in closed form, so the network
    # learns only the SHAPE and the primary amplitude generalizes for
    # free; it reads the two named RAW parameter columns below (As must
    # be the linear amplitude — the generator samples it linearly).
    # "none" learns the raw C_ell directly and forbids the two names.
    amplitude_law: as_exp2tau
    as_name:       As
    tau_name:      tau

  # the dumps (dataset_generator_cmb.py): the chosen spectrum's dv files
  # plus the chain sidecars; the covmat header names the input parameters
  # in whitening order.
  train_dv:     dvs_train_cmblensed_unifs_tt.npy
  val_dv:       dvs_val_cmblensed_unifs_tt.npy
  train_params: params_train_cmblensed_unifs.1.txt
  val_params:   params_val_cmblensed_unifs.1.txt
  train_covmat: params_train_cmblensed_unifs.covmat

  # absolute row counts (kept after any optional cuts).
  n_train:    50000
  n_val:      10000
  split_seed: 0
  ram_frac:   0.7

  # data.param_cuts is OPTIONAL on the CMB path (the omega windows
  # reference cosmic-shear parameter names a CMB dump may not carry).

# OPTIONAL NPCE trunk (README section 12): fit a closed-form
# sparse-Legendre base on the whitened C_ell rows at staging, then train
# the model below as the refiner correcting it. A top-level block (a
# sibling of data / train_args — structurally unsweepable, one base per
# study). On this family the form is residual only, and the block needs
# amplitude_law: none above — the imposed law and the base each replace
# the target construction, one at a time. The fit knobs and their
# defaults are annotated in example_yamls/cosmic_shear_train_emulator.yaml.
# pce:
#   form: residual

# OPTIONAL frozen-base transfer (README section 13): freeze a saved CMB
# emulator of the SAME spectrum and covariance file and train the model
# below as a small parallel correction — the tool for a NEW physics
# sector, where fine-tuning's same-capacity adaptation is not enough.
# On this family the composition acts in the whitened space (form sum
# recommended; gain prints a zero-crossing note), the block needs
# amplitude_law: none above (base and run both), and refine: is not
# offered here yet. Exclusive with pce: and train_args.finetune.
# transfer:
#   from: chains/my_lcdm_tt_base
#   form: sum

train_args:
  nepochs: 400
  bs:      256

  # the model. name picks the architecture: resmlp (the plain trunk) or
  # the correction heads rescnn / restrf — the same heads the
  # cosmic-shear path trains. The diagonal CMB geometry keeps the
  # multipole order, so the heads correct along the spectrum directly:
  # rescnn slides an odd-width conv kernel along ell (locality across
  # neighboring multipoles); restrf re-segments the spectrum into
  # model.trf.n_tokens contiguous windows and attends across them (the
  # attention-emulator tokenization, arXiv 2505.22574). Uncomment ONE
  # head block together with its name. With a head, the two-phase
  # schedule applies here exactly as on cosmic shear (trunk_epochs /
  # freeze_trunk + the trunk: / head: blocks — README section 11).
  model:
    name: resmlp
    mlp:
      width:    256
      n_blocks: 4
    activation:
      type:    H
      n_gates: 3
    # cnn:                   # with name: rescnn
    #   kernel_size: 11      # odd conv width, slides along ell
    #   n_blocks:    1
    # trf:                   # with name: restrf
    #   n_heads:      2      # must divide ceil(n_ell / n_tokens)
    #   n_blocks:     1
    #   n_mlp_blocks: 2
    #   n_tokens:     16     # attention windows over the spectrum

  # the per-multipole cosmic-variance chi2 (losses/cmb.py); sqrt is the
  # usual default, and the FULL shared mode ladder applies here exactly
  # as on cosmic shear (chi2 / sqrt / sqrt_dchi2 / berhu / berhu_capped,
  # with the berhu: knot / cap / anneal sub-block — see the annotated
  # ladder in example_yamls/cosmic_shear_train_emulator.yaml). The
  # OPTIONAL roughness sub-block penalizes short-period residual
  # oscillations (periods below period_cut in ell) without touching the
  # acoustic band (~200-300, incl. lensing peak smoothing); absent
  # block = the term does not exist.
  loss:
    mode: sqrt
    roughness:
      lam:        0.1
      period_cut: 50

  optimizer:           # cls is fixed to AdamW in the driver
    weight_decay: 0.0

  lr:
    lr_base:       0.001
    bs_base:       256.0
    warmup_epochs: 5

  scheduler:           # cls is fixed to ReduceLROnPlateau
    mode:     min
    patience: 25
    factor:   0.8

  # OPTIONAL training guards — the SAME shared loop as cosmic shear, so
  # all three apply here unchanged (off when absent). clip = per-step
  # gradient-norm ceiling; rewind = on every plateau lr cut, reload the
  # best weights + optimizer snapshot (the self-heal after a bad
  # excursion); ema = a Polyak weight average {horizon_epochs, anneal}
  # coupled to the best snapshot / rewind. The annotated versions live
  # in example_yamls/cosmic_shear_train_emulator.yaml.
  # clip:   1.0
  # rewind: true
  # ema:
  #   horizon_epochs: 20

  # trim and focus are REQUIRED blocks (build_run_specs reads them with no
  # code default — the resolved-values rule). Both ship off here.
  trim:
    start:         0.0
    end:           0.0
    hold_epochs:   0
    anneal_epochs: 1
    shape:         cosine

  focus:
    start:         0.0
    end:           0.0
    hold_epochs:   0
    anneal_epochs: 1
    shape:         linear
    kappa:         0.15

  # OPTIONAL fine-tuning: warm-start from a saved CMB emulator of
  # the SAME spectrum, law, and covariance file (the source geometry is
  # pinned, so epoch 0 reproduces the source exactly). Delete the model:
  # block when using it — the architecture is inherited from the source.
  # finetune:
  #   from: chains/emulator_tt_resmlp_ntrain50000
