# Fine-tune warm start config for train_single_emulator_cosmic_shear.py
# (see notes/finetune-warm-start.md and emulator/warmstart.py).
#
# A fine-tune run continues a saved emulator on a new training set with a
# lower initial learning rate, instead of starting from random weights. The
# usual case is nested: the new parameter space is the old one plus a few
# extra parameters (here w0, wa on top of an LCDM source).
#
# What a fine-tune YAML does NOT carry, because it is all inherited from the
# source artifact and is a loud error here (train_args.finetune bypasses the
# model-name resolution): a model: block (the architecture and activation come
# from the source .h5 recipe), a pce: block, a --rescale other than none, a
# --activation flag, or any two-phase key (trunk_epochs / trunk: / head: /
# freeze_trunk). It DOES carry a normal data block and the usual training
# knobs (optimizer / lr / scheduler / trim / focus / loss).

data:
  # the NEW training set (w0waCDM here): its own dv / params / covmat. The
  # covmat header names must be a superset of the source's (the extras are
  # the new-only names, w0 / wa).
  train_dv:     w0wa_takahashi_dvs_train_cs_16.npy
  train_params: w0wa_takahashi_params_train_cs_16.1.txt
  train_covmat: w0wa_takahashi_params_train_cs_16.covmat
  val_dv:       w0wa_takahashi_dvs_train_cs_8.npy
  val_params:   w0wa_takahashi_params_train_cs_8.1.txt

  # MUST match the source run exactly: fine-tuning pins the source's output
  # geometry (same dataset + mask + scale cut), so a different dataset here is
  # a loud error (a different scale cut changes the dv length entirely, a
  # separate unit of work, D-FT10).
  cosmolike_data_dir: lsst_y1
  cosmolike_dataset:  lsst_y1_M1_GGL0.05.dataset

  param_cuts:
    omegabh2_hi:   0.035
    omegabh2_lo:   0.014
    omegam2h2_lo:  0.015
    omegam2h2_hi:  0.08
  n_train:       25000
  n_val:         5000
  split_seed:    0
  ram_frac:      0.7

train_args:
  nepochs:   400          # a warm start needs far fewer epochs than a
                          # from-scratch run
  bs:        256

  # The one new block: point at the source emulator to continue from.
  finetune:
    # the source artifact path root: <from>.h5 + <from>.emul, as written by
    # save_emulator. A relative path resolves under $ROOTDIR (the cobaya
    # convention); an absolute path is used as-is. Either file missing is a
    # loud error naming the resolved path.
    from: projects/lsst_y1/chains/lcdm_source_resmlp_t256_ntrain250000
    # compile_mode:  default   # optional: override the source recipe's
    #                          # torch.compile mode for this machine
    #                          # (reduce-overhead / default / null = eager).
    #                          # Absent = the mode the source was saved with.

  # The lower learning rate is NOT a new knob: it is just a smaller lr_base
  # here (one decade below the source run is the starting recommendation).
  # The optimizer restarts with cold Adam moments, so keep warmup_epochs >= 3
  # to protect the loaded weights from the first-step kick.
  lr:
    lr_base:       0.00025    # one decade below a 0.0025 source run
    bs_base:       64.0
    warmup_epochs: 10

  # optional nested loss block (absent -> mode sqrt).
  loss:
    mode: sqrt

  optimizer:             # cls is fixed to AdamW in the driver
    weight_decay: 0.0

  scheduler:             # cls is fixed to ReduceLROnPlateau
    mode:     min
    patience: 25
    factor:   0.8

  trim:
    start:         0.1
    end:           0.025
    hold_epochs:   50
    anneal_epochs: 200
    shape:         cosine

  focus:
    start:         0.0
    end:           2.0
    hold_epochs:   50
    anneal_epochs: 200
    shape:         linear
    kappa:         0.15
