# CMB covariance configuration for compute_cmb_covariance.py
# (Motloch & Hu 1709.03599 eqs 1-7, the file notes/families-scalar-cmb.md).
#
# Three blocks. `theory` is the FIXED high-accuracy CAMB-within-cobaya
# configuration (the user's settings, verbatim — the covariance is only as
# good as this evaluation). `params` is the fiducial cosmology: ALWAYS a
# flat LCDM, every parameter a fixed value (the script rejects anything
# else, loudly). `cov_args` holds the experiment inputs — instrumental
# noise and beam — plus the non-Gaussian flag, OFF by default: Gaussian
# terms are tested first, and the lens-induced covariance (eq 6) turns on
# only when the science asks.

theory:
  camb:
    path: ./external_modules/code/CAMB
    extra_args:
      halofit_version: takahashi
      lmax: 7000
      kmax: 10
      k_per_logint: 130
      AccuracyBoost: 1.5
      lAccuracyBoost: 1.2
      lens_margin: 2050
      lens_k_eta_reference: 36000.0
      nonlinear: NonLinear_both
      recombination_model: CosmoRec
      Accuracy.AccurateBB: True
      min_l_logl_sampling: 6000
      DoLateRadTruncation: False

params:
  As:       2.1e-9
  ns:       0.9660
  H0:       67.36
  omegabh2: 0.02237
  omegach2: 0.1200
  tau:      0.0544
  mnu:      0.06

cov_args:
  lmax: 5000              # covariance multipole range 2..lmax
  fsky: 1.0               # sky fraction; always recorded, never silent

  # the experiment: instrumental noise (muK-arcmin) + beam (arcmin),
  # eq 1's conventions. delta_te 0 = uncorrelated T/E noise.
  noise:
    delta_tt:  1.0
    delta_ee:  1.4
    delta_te:  0.0
    beam_fwhm: 1.0

  # THE NON-DIAGONAL TERMS (Motloch & Hu eq 6): the lens-induced
  # covariance between different multipoles. enabled: true writes the
  # DENSE blocks into the .npz — cov_tt / cov_te / cov_ee (each
  # spectrum against itself) AND cov_tt_te / cov_tt_ee / cov_te_ee
  # (the cross-spectrum blocks); together they tile the full joint
  # TT/TE/EE covariance. How it is computed: the lensing potential is
  # perturbed band by band, the spectra re-lensed (one Boltzmann
  # solve total), and dC_l/dC^phiphi_L taken by the 5-point stencil
  # at EVERY step size below; the per-band spread across steps must
  # sit under converge_rtol or the run fails loudly (the step study
  # is persisted in the .npz provenance either way). Cost note: the
  # re-lensing count is (bands x steps x 4), so lens_lmax 3000 at
  # band_width 20 with 3 steps is ~1800 re-lensings — hours, not
  # minutes; widen band_width for a faster, coarser matrix.
  nongaussian:
    enabled: false        # flip to true for the dense blocks
    lens_lmax: 3000
    band_width: 20        # multipoles per perturbed band (1 = exact)
    step_fracs:
      - 0.01
      - 0.02
      - 0.04
    converge_rtol: 0.05
